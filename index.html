<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawlers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
        }

        canvas { display: block; }

        /* --- Click-to-play overlay --- */
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            color: #c4a86b;
            pointer-events: none;
            z-index: 10;
            gap: 16px;
        }
        #overlay h1 {
            font-size: 42px;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(196, 168, 107, 0.4);
        }
        #overlay p {
            font-size: 18px;
            color: #887755;
            letter-spacing: 2px;
        }

        /* --- Crosshair --- */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.35);
        }
        #crosshair::before {
            width: 2px;
            height: 18px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            width: 18px;
            height: 2px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Dungeon Crawlers</h1>
        <p>Click to enter the dungeon</p>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
